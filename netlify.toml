[build]
  command = "npm run build"
  publish = "dist"

# ── SPA routing ────────────────────────────────────────────────────────────
# Redirect all routes to index.html so React handles routing client-side.
# Without this, a hard refresh on any sub-path returns a 404 from Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache: immutable assets (hashed filenames from Vite) ──────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: service worker and manifest — never cache ──────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
